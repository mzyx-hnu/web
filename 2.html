<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10×10 战棋模拟器 (火焰纹章 Lite • 多单位版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #020617;
            color: #cbd5e1;
            overflow-x: hidden;
            user-select: none;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        .grid-cell {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .grid-cell:hover {
            filter: brightness(1.15);
        }
        .highlight-move {
            background: rgba(16, 185, 129, 0.45) !important;
            box-shadow: 0 0 0 4px rgb(16 185 129) inset;
            animation: movePulse 1.8s infinite;
        }
        /* 移动范围内颜色较深的一圈攻击范围高亮（更醒目的深红） */
        .highlight-attack {
            background: rgba(239, 68, 68, 0.65) !important; /* 更深、更明显 */
            box-shadow: 0 0 0 6px rgb(239 68 68) inset;
            animation: attackPulse 1.1s infinite;
        }
        .unit-cell {
            position: relative;
        }
        .unit-cell::after {
            content: attr(data-unit);
            font-size: 2.4rem;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            filter: drop-shadow(0 10px 8px rgb(0 0 0 / 0.4));
            z-index: 10;
            pointer-events: none;
        }
        .unit-dead::after {
            content: "💀";
            font-size: 1.8rem;
            opacity: 0.4;
        }

        @keyframes movePulse { 0%,100%{opacity:1} 50%{opacity:0.65} }
        @keyframes attackPulse { 0%,100%{opacity:1} 50%{opacity:0.55} }

        .hp-bar { height: 8px; background: #1e2937; border-radius: 9999px; overflow: hidden; }
        .hp-fill { height: 100%; transition: width 0.4s ease; }

        .turn-indicator { animation: pulse-turn 2s infinite; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 bg-[url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=2070&auto=format&fit=crop')] bg-cover bg-center bg-no-repeat bg-fixed">
    
    <div class="fixed inset-0 bg-black/80 backdrop-blur-[3px] z-0"></div>

    <div id="game-container" class="relative z-10 w-full max-w-6xl glass-panel rounded-3xl overflow-hidden flex flex-col shadow-2xl min-h-[720px] transition-opacity duration-500 border-t border-white/10">
        
        <!-- 顶部栏 -->
        <div class="px-8 py-5 border-b border-white/10 flex justify-between items-center bg-slate-900/60">
            <div class="flex items-center gap-x-3">
                <div class="text-4xl">🏰</div>
                <div>
                    <h1 class="text-3xl font-black italic tracking-[-2px] text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400">
                        10×10 战棋模拟器
                    </h1>
                    <div class="text-xs font-bold text-emerald-300 tracking-[2px] uppercase">火焰纹章 Lite • 多单位拓展版</div>
                </div>
            </div>
            
            <!-- 回合信息 -->
            <div class="flex flex-col items-center">
                <div id="turn-display" class="px-6 py-1 bg-slate-800 rounded-2xl flex items-center gap-x-2 text-sm font-bold">
                    <span id="turn-team" class="turn-indicator">🟦 玩家回合</span>
                    <span id="turn-number" class="font-mono text-xl text-white">01</span>
                </div>
                <div id="phase-text" class="text-[10px] text-emerald-300 mt-1 tracking-widest">点击任意单位查看属性 → 友方可移动/攻击</div>
            </div>

            <button onclick="endPlayerTurn()" 
                    id="end-turn-btn"
                    class="px-7 py-3 bg-gradient-to-r from-cyan-500 to-emerald-500 hover:from-cyan-600 hover:to-emerald-600 text-white font-bold rounded-2xl text-sm flex items-center gap-2 shadow-lg transition-all">
                <span>⏭️</span>
                结束回合
            </button>
        </div>

        <div class="flex flex-1 p-8 gap-8">
            
            <!-- 左侧：游戏规则 + 全场单位列表 -->
            <div class="w-72 glass-panel rounded-3xl p-5 flex flex-col text-xs space-y-4">
                <div class="font-bold text-emerald-400 uppercase tracking-widest text-center mb-2">游戏规则（简化版）</div>
                <div class="text-slate-300 leading-relaxed space-y-3 text-[13px]">
                    <p>1. <span class="text-emerald-400">点击任意单位</span>（友方或敌方）可查看属性与范围</p>
                    <p>2. 友方未行动时：点击绿色格子移动</p>
                    <p>3. 移动后点击深红色格子攻击</p>
                    <p>4. 移动范围内会显示一圈<span class="text-rose-400">深红色攻击范围</span></p>
                    <p>5. 点击已选中单位可取消选中</p>
                    <p class="text-amber-300">• 伤害公式：ATK - DEF（最低1）</p>
                </div>
                
                <!-- 全场单位血量一览 -->
                <div class="mt-4">
                    <div class="text-emerald-400 text-[10px] font-bold uppercase mb-2">友方单位</div>
                    <div id="friendly-list" class="space-y-2"></div>
                </div>
                <div>
                    <div class="text-rose-400 text-[10px] font-bold uppercase mb-2">敌方单位</div>
                    <div id="enemy-list" class="space-y-2"></div>
                </div>
                
                <div onclick="resetGame()" class="mt-auto cursor-pointer text-center py-3 border border-white/20 hover:border-white/40 rounded-2xl text-slate-400 hover:text-white text-xs font-bold flex items-center justify-center gap-2">
                    <span>🔄</span> 重开一局
                </div>
            </div>

            <!-- 核心 10×10 棋盘 -->
            <div class="flex-1 flex items-center justify-center">
                <div id="board" 
                     class="grid grid-cols-10 gap-px bg-slate-700/80 p-3 rounded-3xl shadow-2xl border border-white/10"
                     style="width: 660px; height: 660px;">
                    <!-- JS 动态生成 100 个格子 -->
                </div>
            </div>

            <!-- 右侧：选中单位详细属性面板 + 战斗日志 -->
            <div class="w-80 glass-panel rounded-3xl p-5 flex flex-col">
                
                <!-- 选中单位属性面板 -->
                <div id="selected-panel" class="hidden mb-5">
                    <div class="flex items-center gap-3 mb-3">
                        <div id="selected-emoji" class="text-5xl"></div>
                        <div>
                            <div id="selected-name" class="font-bold text-lg"></div>
                            <div id="selected-team" class="text-xs px-3 py-0.5 rounded-full inline-block"></div>
                        </div>
                    </div>
                    
                    <div class="bg-slate-900/60 rounded-2xl p-4 space-y-4">
                        <div>
                            <div class="flex justify-between text-xs font-bold mb-1">
                                <span>生命值 HP</span>
                                <span id="selected-hp-text" class="font-mono"></span>
                            </div>
                            <div class="hp-bar">
                                <div id="selected-hp-fill" class="hp-fill bg-emerald-400"></div>
                            </div>
                        </div>
                        
                        <div class="flex justify-between items-center text-sm">
                            <span class="font-bold text-amber-300">⚔️ 攻击力 ATK</span>
                            <span id="selected-atk" class="font-mono text-xl font-bold"></span>
                        </div>
                        
                        <div class="flex justify-between items-center text-sm">
                            <span class="font-bold text-sky-300">🛡️ 防御力 DEF</span>
                            <span id="selected-def" class="font-mono text-xl font-bold"></span>
                        </div>
                        
                        <div class="flex justify-between items-center text-sm">
                            <span class="font-bold text-emerald-300">🚶 移动范围</span>
                            <span id="selected-move" class="font-mono text-xl font-bold"></span>
                        </div>
                        
                        <div class="flex justify-between items-center text-sm">
                            <span class="font-bold text-rose-300">🎯 攻击范围</span>
                            <span id="selected-range" class="font-mono text-xl font-bold"></span>
                        </div>
                    </div>
                </div>

                <!-- 战斗日志 -->
                <div class="flex-1 flex flex-col">
                    <div class="text-xs font-bold uppercase tracking-widest text-rose-300 mb-3">战斗日志</div>
                    <div id="log-container" class="flex-1 overflow-y-auto text-xs text-slate-300 space-y-2 custom-scroll pr-2">
                        <!-- JS 动态插入 -->
                    </div>
                </div>
                
                <div class="text-[10px] text-slate-400 mt-4 pt-4 border-t border-white/10">
                    当前回合：<span id="log-turn" class="font-mono">1</span><br>
                    敌方AI会优先靠近最近友方并攻击
                </div>
            </div>
        </div>
    </div>

    <!-- 胜负弹窗 -->
    <div id="result-modal" onclick="if(event.target.id==='result-modal')hideModal()" 
         class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-xl">
        <div class="glass-panel max-w-sm w-full rounded-3xl p-8 text-center">
            <div id="result-icon" class="text-8xl mb-6"></div>
            <h2 id="result-title" class="text-4xl font-black mb-3"></h2>
            <p id="result-text" class="text-slate-300 mb-8"></p>
            
            <div class="flex gap-4">
                <button onclick="hideModal(); resetGame()" 
                        class="flex-1 py-4 bg-gradient-to-r from-emerald-500 to-cyan-500 text-white font-bold rounded-2xl">再来一局</button>
                <button onclick="hideModal()" 
                        class="flex-1 py-4 bg-slate-700 text-slate-300 font-bold rounded-2xl">关闭</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 单位配置（高度可拓展） ====================
        const UNIT_TYPES = {
            knight: { 
                emoji: "⚔️", 
                name: "骑士", 
                hp: 22, 
                atk: 9, 
                def: 4, 
                moveRange: 4, 
                atkRange: 1 
            },
            archer: { 
                emoji: "🏹", 
                name: "弓箭手", 
                hp: 16, 
                atk: 8, 
                def: 2, 
                moveRange: 3, 
                atkRange: 2 
            },
            heavy: { 
                emoji: "🛡️", 
                name: "重甲战士", 
                hp: 28, 
                atk: 7, 
                def: 7, 
                moveRange: 2, 
                atkRange: 1 
            },
            mage: { 
                emoji: "🔥", 
                name: "法师", 
                hp: 15, 
                atk: 11, 
                def: 1, 
                moveRange: 3, 
                atkRange: 2 
            }
        };

        // ==================== 游戏状态 ====================
        let STATE = {
            friendlyUnits: [],
            enemyUnits: [],
            currentTurn: "player",
            turnCount: 1,
            selected: null,          // {team: "friendly"|"enemy", id: "..."} 或 null
            phase: "select"
        };

        // ==================== 日志系统 ====================
        function addLog(message, color = "slate") {
            const container = document.getElementById("log-container");
            const div = document.createElement("div");
            div.className = `px-3 py-2 rounded-xl bg-slate-800/50 border-l-4 border-${color}-400`;
            div.innerHTML = `<span class="font-mono text-[10px] text-slate-400">[${STATE.turnCount}]</span> ${message}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            if (container.children.length > 9) container.removeChild(container.children[0]);
        }

        // ==================== 获取单位 ====================
        function getUnit(team, id) {
            return STATE[team + "Units"].find(u => u.id === id);
        }

        // ==================== 渲染棋盘 ====================
        function renderBoard() {
            const boardEl = document.getElementById("board");
            boardEl.innerHTML = "";

            for (let r = 0; r < 10; r++) {
                for (let c = 0; c < 10; c++) {
                    const cell = document.createElement("div");
                    cell.className = `
                        grid-cell unit-cell w-[62px] h-[62px] flex items-center justify-center text-3xl
                        bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-2xl cursor-pointer
                    `;
                    cell.dataset.row = r;
                    cell.dataset.col = c;

                    let unitHere = null;
                    for (let u of STATE.friendlyUnits) {
                        if (u.hp > 0 && u.row === r && u.col === c) {
                            unitHere = { ...u, team: "friendly" };
                            break;
                        }
                    }
                    if (!unitHere) {
                        for (let u of STATE.enemyUnits) {
                            if (u.hp > 0 && u.row === r && u.col === c) {
                                unitHere = { ...u, team: "enemy" };
                                break;
                            }
                        }
                    }

                    if (unitHere) {
                        cell.setAttribute("data-unit", UNIT_TYPES[unitHere.type].emoji);
                        cell.style.background = unitHere.team === "friendly" 
                            ? "rgba(16, 185, 129, 0.18)" 
                            : "rgba(239, 68, 68, 0.18)";
                    }

                    cell.addEventListener("click", () => handleCellClick(r, c));
                    boardEl.appendChild(cell);
                }
            }

            if (STATE.selected) highlightRanges();
        }

        // ==================== 高亮范围（移动范围 + 移动范围内一圈深色攻击范围） ====================
        function highlightRanges() {
            const cells = document.querySelectorAll(".grid-cell");
            const sel = STATE.selected;
            if (!sel) return;

            const unit = getUnit(sel.team, sel.id);
            if (!unit || unit.hp <= 0) return;

            const config = UNIT_TYPES[unit.type];

            cells.forEach(cell => {
                const r = parseInt(cell.dataset.row);
                const c = parseInt(cell.dataset.col);
                cell.classList.remove("highlight-move", "highlight-attack");

                const manhattan = Math.abs(r - unit.row) + Math.abs(c - unit.col);

                // 1. 移动范围（绿色）
                if (manhattan <= config.moveRange) {
                    let occupied = false;
                    [...STATE.friendlyUnits, ...STATE.enemyUnits].forEach(u => {
                        if (u.hp > 0 && u.row === r && u.col === c) occupied = true;
                    });
                    if (!occupied) cell.classList.add("highlight-move");
                }

                // 2. 攻击范围（从当前位置计算，深红色一圈，叠加在移动范围内）
                if (manhattan <= config.atkRange) {
                    cell.classList.add("highlight-attack");
                }
            });
        }

        // ==================== 处理格子点击 ====================
        function handleCellClick(row, col) {
            if (STATE.currentTurn !== "player") return;

            const sel = STATE.selected;

            // === 未选中时：点击任意存活单位都可选中（友方或敌方） ===
            if (!sel) {
                // 检查友方
                for (let u of STATE.friendlyUnits) {
                    if (u.hp > 0 && u.row === row && u.col === col) {
                        STATE.selected = { team: "friendly", id: u.id };
                        STATE.phase = "select";
                        addLog(`选中 <span class="text-emerald-400">${UNIT_TYPES[u.type].emoji} ${UNIT_TYPES[u.type].name}</span>`, "emerald");
                        renderBoard();
                        updateSelectedPanel();
                        return;
                    }
                }
                // 检查敌方
                for (let u of STATE.enemyUnits) {
                    if (u.hp > 0 && u.row === row && u.col === col) {
                        STATE.selected = { team: "enemy", id: u.id };
                        STATE.phase = "select";
                        addLog(`查看敌方 <span class="text-rose-400">${UNIT_TYPES[u.type].emoji} ${UNIT_TYPES[u.type].name}</span>`, "rose");
                        renderBoard();
                        updateSelectedPanel();
                        return;
                    }
                }
                return;
            }

            const unit = getUnit(sel.team, sel.id);
            if (!unit) return;

            // === 点击自身 → 取消选中 ===
            if (unit.row === row && unit.col === col) {
                deselectUnit();
                return;
            }

            const manhattan = Math.abs(row - unit.row) + Math.abs(col - unit.col);
            const config = UNIT_TYPES[unit.type];

            // === 只有友方未行动的单位才能移动/攻击 ===
            const canAct = sel.team === "friendly" && !unit.actedThisTurn;

            // 移动阶段
            if (STATE.phase === "select" && canAct && manhattan <= config.moveRange) {
                let occupied = false;
                [...STATE.friendlyUnits, ...STATE.enemyUnits].forEach(u => {
                    if (u.hp > 0 && u.row === row && u.col === col) occupied = true;
                });
                if (occupied) {
                    addLog("⚠️ 该格子已被占据", "amber");
                    return;
                }

                unit.row = row;
                unit.col = col;
                STATE.phase = "moved";
                addLog(`移动到 <span class="font-mono">(${row},${col})</span>`, "emerald");
                renderBoard();
                updateSelectedPanel();
                return;
            }

            // 攻击阶段
            if (STATE.phase === "moved" && canAct && manhattan <= config.atkRange) {
                const target = STATE.enemyUnits.find(e => e.hp > 0 && e.row === row && e.col === col);
                if (target) {
                    performAttack(unit, target);
                    unit.actedThisTurn = true;
                    STATE.selected = null;
                    STATE.phase = "select";
                    renderBoard();
                    updateAllLists();
                    updateSelectedPanel();
                    checkGameOver();
                    return;
                }
            }

            // 其他情况 → 取消选中
            deselectUnit();
        }

        // ==================== 执行攻击 ====================
        function performAttack(attacker, defender) {
            const aConfig = UNIT_TYPES[attacker.type];
            const dConfig = UNIT_TYPES[defender.type];
            let damage = Math.max(1, aConfig.atk - dConfig.def);

            defender.hp = Math.max(0, defender.hp - damage);

            const attackerColor = attacker.type === "knight" || attacker.type === "archer" ? "emerald" : "rose";
            addLog(`<span class="text-${attackerColor}-400">${aConfig.emoji}</span> 对 <span class="text-rose-400">${dConfig.emoji}</span> 造成 <span class="font-bold text-rose-400">${damage}</span> 伤害`, attackerColor);

            renderBoard();
            updateAllLists();
        }

        // ==================== 取消选中 ====================
        function deselectUnit() {
            STATE.selected = null;
            STATE.phase = "select";
            renderBoard();
            updateSelectedPanel();
        }

        // ==================== 敌方AI回合 ====================
        function enemyTurn() {
            STATE.currentTurn = "enemy";
            updateUI();

            STATE.enemyUnits.forEach(u => u.actedThisTurn = false);

            addLog("🔴 敌方回合开始...", "rose");

            let index = 0;
            const actNextEnemy = () => {
                if (index >= STATE.enemyUnits.length) {
                    finishEnemyTurn();
                    return;
                }

                const enemy = STATE.enemyUnits[index];
                if (enemy.hp <= 0 || enemy.actedThisTurn) {
                    index++;
                    actNextEnemy();
                    return;
                }

                let closest = null;
                let minDist = Infinity;

                STATE.friendlyUnits.forEach(f => {
                    if (f.hp > 0) {
                        const dist = Math.abs(f.row - enemy.row) + Math.abs(f.col - enemy.col);
                        if (dist < minDist) {
                            minDist = dist;
                            closest = f;
                        }
                    }
                });

                if (!closest) {
                    index++;
                    actNextEnemy();
                    return;
                }

                const config = UNIT_TYPES[enemy.type];
                let bestR = enemy.row, bestC = enemy.col;
                let bestDist = Infinity;

                for (let dr = -config.moveRange; dr <= config.moveRange; dr++) {
                    for (let dc = -config.moveRange; dc <= config.moveRange; dc++) {
                        const nr = enemy.row + dr;
                        const nc = enemy.col + dc;
                        if (nr < 0 || nr > 9 || nc < 0 || nc > 9) continue;

                        let occupied = false;
                        [...STATE.friendlyUnits, ...STATE.enemyUnits].forEach(u => {
                            if (u.hp > 0 && u.row === nr && u.col === nc) occupied = true;
                        });
                        if (occupied) continue;

                        const newDist = Math.abs(nr - closest.row) + Math.abs(nc - closest.col);
                        if (newDist < bestDist) {
                            bestDist = newDist;
                            bestR = nr;
                            bestC = nc;
                        }
                    }
                }

                enemy.row = bestR;
                enemy.col = bestC;
                addLog(`<span class="text-rose-400">${config.emoji} ${config.name}</span> 移动到 (${bestR},${bestC})`, "rose");

                renderBoard();

                const afterDist = Math.abs(bestR - closest.row) + Math.abs(bestC - closest.col);
                if (afterDist <= config.atkRange) {
                    setTimeout(() => {
                        performAttack(enemy, closest);
                        enemy.actedThisTurn = true;
                        renderBoard();
                        updateAllLists();
                        checkGameOver();
                        index++;
                        setTimeout(actNextEnemy, 700);
                    }, 650);
                } else {
                    enemy.actedThisTurn = true;
                    index++;
                    setTimeout(actNextEnemy, 700);
                }
            };

            setTimeout(actNextEnemy, 800);
        }

        function finishEnemyTurn() {
            STATE.currentTurn = "player";
            STATE.turnCount++;
            STATE.friendlyUnits.forEach(u => u.actedThisTurn = false);
            renderBoard();
            updateUI();
            updateSelectedPanel();
            addLog("✅ 敌方回合结束，轮到你了！", "emerald");
        }

        function endPlayerTurn() {
            if (STATE.currentTurn !== "player") return;
            deselectUnit();
            enemyTurn();
        }

        // ==================== 更新选中面板 ====================
        function updateSelectedPanel() {
            const panel = document.getElementById("selected-panel");
            if (!STATE.selected) {
                panel.classList.add("hidden");
                return;
            }

            const unit = getUnit(STATE.selected.team, STATE.selected.id);
            if (!unit || unit.hp <= 0) {
                panel.classList.add("hidden");
                return;
            }

            const config = UNIT_TYPES[unit.type];

            document.getElementById("selected-emoji").innerHTML = config.emoji;
            document.getElementById("selected-name").textContent = config.name;
            document.getElementById("selected-team").innerHTML = 
                STATE.selected.team === "friendly" 
                ? `<span class="bg-emerald-400 text-white px-3 py-0.5 rounded-full text-xs">友方</span>`
                : `<span class="bg-rose-400 text-white px-3 py-0.5 rounded-full text-xs">敌方</span>`;

            const hpPercent = Math.max(0, Math.round((unit.hp / unit.maxHp) * 100));
            document.getElementById("selected-hp-fill").style.width = hpPercent + "%";
            document.getElementById("selected-hp-fill").className = `hp-fill ${STATE.selected.team === "friendly" ? "bg-emerald-400" : "bg-rose-400"}`;
            document.getElementById("selected-hp-text").innerHTML = `${unit.hp} / ${unit.maxHp}`;

            document.getElementById("selected-atk").textContent = config.atk;
            document.getElementById("selected-def").textContent = config.def;
            document.getElementById("selected-move").textContent = config.moveRange;
            document.getElementById("selected-range").textContent = config.atkRange;

            panel.classList.remove("hidden");
        }

        // ==================== 更新全场列表 ====================
        function updateAllLists() {
            const fList = document.getElementById("friendly-list");
            fList.innerHTML = "";
            STATE.friendlyUnits.forEach(u => {
                if (u.hp <= 0) return;
                const config = UNIT_TYPES[u.type];
                const percent = Math.round((u.hp / u.maxHp) * 100);
                const div = document.createElement("div");
                div.className = "flex items-center gap-3 bg-emerald-900/30 px-3 py-2 rounded-2xl text-xs";
                div.innerHTML = `
                    <span class="text-2xl">${config.emoji}</span>
                    <div class="flex-1">
                        <div class="font-medium">${config.name}</div>
                        <div class="hp-bar w-full"><div class="hp-fill bg-emerald-400" style="width:${percent}%"></div></div>
                    </div>
                    <span class="font-mono">${u.hp}/${u.maxHp}</span>
                `;
                fList.appendChild(div);
            });

            const eList = document.getElementById("enemy-list");
            eList.innerHTML = "";
            STATE.enemyUnits.forEach(u => {
                if (u.hp <= 0) return;
                const config = UNIT_TYPES[u.type];
                const percent = Math.round((u.hp / u.maxHp) * 100);
                const div = document.createElement("div");
                div.className = "flex items-center gap-3 bg-rose-900/30 px-3 py-2 rounded-2xl text-xs";
                div.innerHTML = `
                    <span class="text-2xl">${config.emoji}</span>
                    <div class="flex-1">
                        <div class="font-medium">${config.name}</div>
                        <div class="hp-bar w-full"><div class="hp-fill bg-rose-400" style="width:${percent}%"></div></div>
                    </div>
                    <span class="font-mono">${u.hp}/${u.maxHp}</span>
                `;
                eList.appendChild(div);
            });
        }

        function checkGameOver() {
            const allFriendlyDead = STATE.friendlyUnits.every(u => u.hp <= 0);
            const allEnemyDead = STATE.enemyUnits.every(u => u.hp <= 0);

            if (allEnemyDead) setTimeout(() => showResult(true), 300);
            else if (allFriendlyDead) setTimeout(() => showResult(false), 300);
        }

        function updateUI() {
            const turnEl = document.getElementById("turn-team");
            if (STATE.currentTurn === "player") {
                turnEl.innerHTML = `🟦 玩家回合`;
                turnEl.className = "turn-indicator text-emerald-400";
            } else {
                turnEl.innerHTML = `🔴 敌方回合`;
                turnEl.className = "turn-indicator text-rose-400";
            }
            document.getElementById("turn-number").textContent = String(STATE.turnCount).padStart(2, "0");
            document.getElementById("log-turn").textContent = STATE.turnCount;
            document.getElementById("end-turn-btn").disabled = STATE.currentTurn !== "player";
        }

        function showResult(isWin) {
            const modal = document.getElementById("result-modal");
            modal.classList.remove("hidden");
            
            const iconEl = document.getElementById("result-icon");
            const titleEl = document.getElementById("result-title");
            const textEl = document.getElementById("result-text");
            
            if (isWin) {
                iconEl.textContent = "🏆";
                titleEl.innerHTML = `<span class="text-emerald-400">胜利！</span>`;
                textEl.innerHTML = `你成功消灭了全部敌方单位！<br>共用 <span class="font-mono">${STATE.turnCount}</span> 回合`;
            } else {
                iconEl.textContent = "💀";
                titleEl.innerHTML = `<span class="text-rose-400">失败</span>`;
                textEl.innerHTML = `你的部队全军覆没…<br>下次再战！`;
            }
        }
        
        function hideModal() {
            document.getElementById("result-modal").classList.add("hidden");
        }

        // ==================== 重置游戏（2友方 + 2敌方） ====================
        function resetGame() {
            STATE.friendlyUnits = [
                { id: "f1", type: "knight", row: 1, col: 2, hp: UNIT_TYPES.knight.hp, maxHp: UNIT_TYPES.knight.hp, actedThisTurn: false },
                { id: "f2", type: "archer", row: 1, col: 5, hp: UNIT_TYPES.archer.hp, maxHp: UNIT_TYPES.archer.hp, actedThisTurn: false }
            ];

            STATE.enemyUnits = [
                { id: "e1", type: "heavy", row: 8, col: 7, hp: UNIT_TYPES.heavy.hp, maxHp: UNIT_TYPES.heavy.hp, actedThisTurn: false },
                { id: "e2", type: "mage", row: 8, col: 3, hp: UNIT_TYPES.mage.hp, maxHp: UNIT_TYPES.mage.hp, actedThisTurn: false }
            ];

            STATE.currentTurn = "player";
            STATE.turnCount = 1;
            STATE.selected = null;
            STATE.phase = "select";

            document.getElementById("log-container").innerHTML = "";
            addLog("🎮 新一局开始！友方 2 单位 vs 敌方 2 单位", "emerald");
            addLog("点击任意单位可查看属性与范围", "emerald");

            renderBoard();
            updateAllLists();
            updateUI();
            updateSelectedPanel();
        }

        function initGame() {
            resetGame();
        }

        window.onload = initGame;
    </script>
</body>
</html>
